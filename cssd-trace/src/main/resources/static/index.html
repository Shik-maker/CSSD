<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSSD 消毒供应中心追溯系统</title>
    <link rel="stylesheet" href="styles.css?v=2026070104">
</head>
<body>
<div class="shell">
    <aside class="side">
        <div class="brand">
            <span class="brand-mark">CSSD</span>
            <strong>消毒供应中心追溯系统</strong>
            <small>Traceability Platform</small>
        </div>
        <nav class="nav" id="nav">
            <div class="nav-section">
                <button class="nav-item active" data-page="dashboard">数据总览</button>
                <button class="nav-item" data-page="trace">追溯查询</button>
                <button class="nav-item" data-page="recycleWork">回收单管理</button>
            </div>

            <div class="nav-section">
                <div class="nav-group-title">统计报表</div>
                <button class="nav-item child" data-page="report">工作量统计</button>
            </div>

            <div class="nav-section">
                <div class="nav-group-title">基础信息</div>
                <button class="nav-item child" data-page="packageManage">器械包管理</button>
                <button class="nav-item child" data-page="packagingManage">包装管理</button>
                <button class="nav-item child" data-page="instrumentManage">器械管理</button>
                <button class="nav-item child" data-page="equipmentManage">设备管理</button>
            </div>

            <div class="nav-section">
                <div class="nav-group-title">单据管理</div>
                <button class="nav-item child" data-page="recycleWork">回收单</button>
                <button class="nav-item child" data-page="washWork">清洗记录</button>
                <button class="nav-item child" data-page="assembleWork">配包记录</button>
                <button class="nav-item child" data-page="print">打包标签</button>
                <button class="nav-item child" data-page="sterilizeWork">灭菌记录</button>
                <button class="nav-item child" data-page="bioWork">生物监测记录</button>
                <button class="nav-item child" data-page="distributeWork">发放单</button>
            </div>

            <div class="nav-section">
                <div class="nav-group-title">系统管理</div>
                <button class="nav-item child" data-page="roleManage">角色管理</button>
                <button class="nav-item child" data-page="userManage">人员管理</button>
                <button class="nav-item child" data-page="departmentManage">科室管理</button>
                <button class="nav-item child" data-page="menuManage">菜单管理</button>
            </div>
        </nav>
        <div class="side-footer">
            <span id="healthDot" class="dot"></span>
            <span id="healthText">服务连接中</span>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div>
                <p class="eyebrow">医院内网部署版 · 数据联动与追溯留痕</p>
                <h1 id="pageTitle">总览大屏</h1>
            </div>
            <div class="top-actions">
                <span id="clock" class="clock"></span>
                <button class="ghost" id="refreshBtn">刷新数据</button>
                <button class="ghost hidden" id="logoutBtn">退出</button>
            </div>
        </header>

        <section id="notice" class="notice hidden"></section>
        <section id="content" class="content"></section>
    </main>
</div>

<template id="emptyTpl">
    <div class="empty">暂无数据</div>
</template>

<script src="app.js?v=2026070104"></script>
</body>
</html>
